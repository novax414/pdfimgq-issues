name: Bug report
description: Report a problem in pdfimgq
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem in pdfimgq.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the problem be reproduced?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pdfimgq version
      placeholder: "e.g. 0.1.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11"

  - type: textarea
    id: extra
    attributes:
      label: Additional notes

  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: Add screenshots if they help explain the problem.
    validations:
      required: false
